services:
  temporal:
    image: temporalio/temporal
    command: server start-dev --ip 0.0.0.0
    ports:
      - "7233:7233"
      - "8233:8233"
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  worker:
    image: ghcr.io/zigflow/zigflow:latest
    user: "0:0"
    command: ["run"]
    environment:
      WORKFLOW_FILE: ""
      WORKFLOW_DIRECTORY: /app/workflows
      WORKFLOW_DIRECTORY_GLOB: "*.{yaml,yml,json}"
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      LOG_LEVEL: info
      DISABLE_TELEMETRY: "false"
    volumes:
      - type: bind
        source: /opt/app-data/zigflow/workflows
        target: /app/workflows
    ports:
      - "3000:3000"
      - "9090:9090"
    depends_on:
      temporal:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/readyz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
