# Coolify one-click service — Temporal Workflow Engine (PostgreSQL backend)
# Deploy via Coolify > New Service > Docker Compose
#
# Magic variables resolved by Coolify at deploy time:
#   SERVICE_PASSWORD_POSTGRES  — auto-generated postgres password
#   SERVICE_USER_POSTGRES      — auto-generated postgres username
#   SERVICE_FQDN_TEMPORALUI_8080 — auto-generated FQDN + proxy rule for the UI
#   SERVICE_URL_TEMPORALUI     — full URL (https://...) for CORS config

services:
  postgresql:
    image: postgres:${POSTGRESQL_VERSION:-16}
    environment:
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
      POSTGRES_USER: ${SERVICE_USER_POSTGRES:-temporal}
    networks:
      - temporal-network
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  temporal-admin-tools:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION:-1.25.2}
    restart: on-failure:6
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${SERVICE_USER_POSTGRES:-temporal}
      - POSTGRES_PWD=${SERVICE_PASSWORD_POSTGRES}
      - POSTGRES_SEEDS=postgresql
      - SQL_PASSWORD=${SERVICE_PASSWORD_POSTGRES}
    networks:
      - temporal-network
    volumes:
      - ./scripts:/scripts
    entrypoint: ["/bin/sh"]
    command: /scripts/setup-postgres.sh

  temporal:
    image: temporalio/server:${TEMPORAL_VERSION:-1.25.2}
    depends_on:
      temporal-admin-tools:
        condition: service_completed_successfully
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${SERVICE_USER_POSTGRES:-temporal}
      - POSTGRES_PWD=${SERVICE_PASSWORD_POSTGRES}
      - POSTGRES_SEEDS=postgresql
      - BIND_ON_IP=0.0.0.0
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    networks:
      - temporal-network
    ports:
      - "7233:7233"
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7233"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 60

  temporal-create-namespace:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION:-1.25.2}
    restart: on-failure:5
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - DEFAULT_NAMESPACE=default
    networks:
      - temporal-network
    volumes:
      - ./scripts:/scripts
    entrypoint: ["/bin/sh"]
    command: /scripts/create-namespace.sh

  temporal-ui:
    image: temporalio/ui:${TEMPORAL_UI_VERSION:-2.31.2}
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=${SERVICE_URL_TEMPORALUI}
    networks:
      - temporal-network
    ports:
      - "${SERVICE_FQDN_TEMPORALUI_8080}"

volumes:
  postgresql-data:

networks:
  temporal-network:
    driver: bridge
