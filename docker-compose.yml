# Coolify one-click service — Temporal Workflow Engine (PostgreSQL backend)
# Self-contained: scripts are inlined, dynamic config uses Coolify content: extension
#
# Magic variables resolved by Coolify at deploy time:
#   SERVICE_PASSWORD_POSTGRES    — auto-generated postgres password
#   SERVICE_USER_POSTGRES        — auto-generated postgres username
#   SERVICE_FQDN_TEMPORALUI_8080 — auto-generated FQDN + proxy rule for the UI
#   SERVICE_URL_TEMPORALUI       — full URL (https://...) for CORS config

services:
  postgresql:
    image: postgres:${POSTGRESQL_VERSION:-16}
    environment:
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
      POSTGRES_USER: ${SERVICE_USER_POSTGRES:-temporal}
    # networks:
    #   - temporal-network
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  temporal-admin-tools:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION:-1.31.0}
    restart: "on-failure:6"
    exclude_from_hc: true
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB_PORT=5432
      - POSTGRES_USER=${SERVICE_USER_POSTGRES:-temporal}
      - POSTGRES_PWD=${SERVICE_PASSWORD_POSTGRES}
      - POSTGRES_SEEDS=postgresql
      - SQL_PASSWORD=${SERVICE_PASSWORD_POSTGRES}
    # networks:
    #   - temporal-network
    labels:
      - coolify.exclude_from_status=true
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        T() {
          temporal-sql-tool \
            --plugin postgres12_pgx \
            --ep "$${POSTGRES_SEEDS}" -u "$${POSTGRES_USER}" --pw "$${SQL_PASSWORD}" \
            --port "$${DB_PORT}" "$$@"
        }
        echo "Setting up temporal database..."
        T --database temporal create-database || true
        T --database temporal setup-schema -v 0.0
        T --database temporal update-schema -d /etc/temporal/schema/postgresql/v12/temporal/versioned
        echo "Setting up temporal_visibility database..."
        T --database temporal_visibility create-database || true
        T --database temporal_visibility setup-schema -v 0.0
        T --database temporal_visibility update-schema -d /etc/temporal/schema/postgresql/v12/visibility/versioned
        echo "Schema setup complete."

  temporal:
    image: temporalio/server:${TEMPORAL_VERSION:-1.31.0}
    depends_on:
      temporal-admin-tools:
        condition: service_completed_successfully
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${SERVICE_USER_POSTGRES:-temporal}
      - POSTGRES_PWD=${SERVICE_PASSWORD_POSTGRES}
      - POSTGRES_SEEDS=postgresql
      - BIND_ON_IP=0.0.0.0
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    # networks:
    #   - temporal-network
    ports:
      - "7233:7233"
    volumes:        
      - type: bind
        source: ./dynamicconfig/development-sql.yaml
        target: /etc/temporal/config/dynamicconfig/development-sql.yaml
        content: | # Coolify extension — not standard Docker Compose; linter warning expected
          system.forceSearchAttributesCacheRefreshOnRead:
            - value: true
              constraints: {}
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7233"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 60

  temporal-create-namespace:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION:-1.31.0}
    restart: "on-failure:5"
    exclude_from_hc: true
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - DEFAULT_NAMESPACE=default
    # networks:
    #   - temporal-network
    labels:
      - coolify.exclude_from_status=true
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        temporal operator namespace create \
          --namespace "$${DEFAULT_NAMESPACE}" \
          --address "$${TEMPORAL_ADDRESS}" || true
        echo "Namespace setup complete."

  temporalui:
    image: temporalio/ui:${TEMPORAL_UI_VERSION:-2.49.1}
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - SERVICE_URL_TEMPORALUI_8080
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=${SERVICE_URL_TEMPORALUI}
    # networks:
    #   - temporal-network
    #   - coolify
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    # labels:
    #   - traefik.enable=true
    #   - "traefik.http.routers.temporal-ui.rule=Host(`${SERVICE_FQDN_TEMPORALUI}`)"
    #   - traefik.http.routers.temporal-ui.entrypoints=http
    #   - traefik.http.services.temporal-ui.loadbalancer.server.port=8080

volumes:
  postgresql-data:

